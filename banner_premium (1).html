<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <title>Yaşar Rent a Car</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Didact+Gothic&family=Tenor+Sans&family=Cormorant:ital,wght@0,300;0,600;0,700;1,300;1,600;1,700&family=Jost:wght@100;200;300;400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --gold: #C9922A;
      --gold-lt: #E8A835;
      --gold-pale: #F0D898;
      --cream: #FAF7F2;
      --cream-2: #F2EDE4;
      --ink: #1a1f3a;
      --ink-2: #0d1020;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      background: #0d1020;
      margin: 0;
      padding: 0;
      height: 160px;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ═══════════════════════════════════
   BANNER SHELL
═══════════════════════════════════ */
    .banner {
      width: 100%;
      height: 160px;
      position: relative;
      overflow: hidden;
      display: flex;
      box-shadow:
        0 0 0 1px rgba(201, 146, 42, 0.35),
        0 0 0 4px rgba(201, 146, 42, 0.06),
        0 50px 140px rgba(0, 0, 0, 0.6),
        0 10px 40px rgba(201, 146, 42, 0.12);
    }

    /* ═══════════════════════════════════
   LEFT PANEL — DARK INK
═══════════════════════════════════ */
    .left {
      width: 40%;
      flex-shrink: 0;
      background: var(--ink-2);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 8px 28px 8px 36px;
      gap: 0;
      z-index: 5;
    }

    /* Angled right edge */
    .left::after {
      content: '';
      position: absolute;
      top: 0;
      right: -45px;
      bottom: 0;
      width: 90px;
      background: var(--ink-2);
      transform: skewX(-5deg);
      z-index: 2;
    }

    /* Mesh grid texture */
    .left-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(201, 146, 42, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201, 146, 42, 0.06) 1px, transparent 1px);
      background-size: 44px 44px;
      z-index: 1;
      pointer-events: none;
    }

    /* Radial glow top-left */
    .left-glow {
      position: absolute;
      top: -80px;
      left: -80px;
      width: 250px;
      height: 250px;
      background: radial-gradient(circle, rgba(201, 146, 42, 0.12) 0%, transparent 65%);
      z-index: 1;
      pointer-events: none;
    }

    .left-content {
      position: relative;
      z-index: 3;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* — Eyebrow — */
    .eyebrow {
      font-family: 'Jost', sans-serif;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 7px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: fadeUp 0.8s ease both;
    }

    .eyebrow::before {
      content: '';
      width: 36px;
      height: 1px;
      background: linear-gradient(90deg, var(--gold), var(--gold-lt));
      flex-shrink: 0;
    }

    /* — Main title — */
    .t-line1 {
      font-family: 'Cormorant', serif;
      font-size: 14px;
      font-weight: 300;
      color: rgba(250, 247, 242, 0.55);
      letter-spacing: 8px;
      text-transform: uppercase;
      line-height: 1;
      margin-bottom: 4px;
      animation: fadeUp 0.8s 0.1s ease both;
    }

    .t-line2 {
      font-family: 'Cormorant', serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--cream);
      letter-spacing: -3px;
      line-height: 0.88;
      margin-bottom: 0px;
      animation: fadeUp 0.8s 0.2s ease both;
    }

    .t-line3 {
      font-family: 'Cormorant', serif;
      font-size: 26px;
      font-weight: 300;
      font-style: italic;
      color: var(--gold-lt);
      letter-spacing: -3px;
      line-height: 0.88;
      margin-bottom: 8px;
      animation: fadeUp 0.8s 0.3s ease both;
    }

    /* — Divider — */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      animation: fadeUp 0.8s 0.35s ease both;
    }

    .divider-line {
      height: 1px;
      width: 40px;
      background: linear-gradient(90deg, var(--gold), transparent);
    }

    .divider-diamond {
      width: 5px;
      height: 5px;
      background: var(--gold);
      transform: rotate(45deg);
      flex-shrink: 0;
      opacity: 0.8;
    }

    .divider-line-r {
      height: 1px;
      flex: 1;
      background: linear-gradient(90deg, rgba(201, 146, 42, 0.3), transparent);
    }

    /* — Description — */
    .desc {
      font-family: 'Jost', sans-serif;
      font-size: 10px;
      font-weight: 200;
      color: rgba(250, 247, 242, 0.45);
      line-height: 1.85;
      letter-spacing: 1px;
      max-width: 330px;
      margin-bottom: 10px;
      animation: fadeUp 0.8s 0.4s ease both;
    }

    /* — Features — */
    .feats {
      display: flex;
      gap: 20px;
      margin-bottom: 12px;
      animation: fadeUp 0.8s 0.5s ease both;
    }

    .feat {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .feat-num {
      font-family: 'Cormorant', serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--gold-lt);
      line-height: 1;
    }

    .feat-label {
      font-family: 'Jost', sans-serif;
      font-size: 8px;
      font-weight: 500;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: rgba(250, 247, 242, 0.35);
    }

    .feat-sep {
      width: 1px;
      background: rgba(201, 146, 42, 0.2);
      align-self: stretch;
      margin: 4px 0;
    }

    /* — CTA Button — */
    .btn-wrap {
      animation: fadeUp 0.8s 0.6s ease both;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      padding: 0;
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Jost', sans-serif;
      font-weight: 600;
      font-size: 9px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--cream);
      position: relative;
    }

    .btn-inner {
      padding: 8px 24px;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-lt) 100%);
      clip-path: polygon(10px 0, 100% 0, calc(100% - 10px) 100%, 0 100%);
      transition: all 0.35s ease;
      box-shadow: 0 6px 30px rgba(201, 146, 42, 0.4);
      position: relative;
      overflow: hidden;
    }

    .btn-inner::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.25), transparent);
      transition: left 0.5s ease;
    }

    .btn:hover .btn-inner::before {
      left: 200%;
    }

    .btn:hover .btn-inner {
      box-shadow: 0 10px 40px rgba(201, 146, 42, 0.6);
      transform: translateY(-1px);
    }

    .btn-arrow {
      font-size: 14px;
      color: var(--gold);
      transition: transform 0.3s;
    }

    .btn:hover .btn-arrow {
      transform: translateX(5px);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ═══════════════════════════════════
   RIGHT PANEL — CREAM LUXURY
═══════════════════════════════════ */
    .right {
      flex: 1;
      background: var(--cream);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Cream-to-warm gradient */
    .right-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 70% 40%, rgba(201, 146, 42, 0.12) 0%, transparent 55%),
        radial-gradient(ellipse at 30% 80%, rgba(201, 146, 42, 0.07) 0%, transparent 45%),
        linear-gradient(145deg, #FAF7F2 0%, #F5EDE0 60%, #EDE0CC 100%);
      z-index: 1;
    }

    /* Fine diagonal hatch */
    .right-hatch {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(-52deg,
          transparent 0px, transparent 18px,
          rgba(201, 146, 42, 0.035) 18px, rgba(201, 146, 42, 0.035) 19px);
      z-index: 2;
      pointer-events: none;
    }

    /* Horizontal scan lines (very subtle) */
    .right-scan {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(0deg,
          transparent 0px, transparent 6px,
          rgba(201, 146, 42, 0.012) 6px, rgba(201, 146, 42, 0.012) 7px);
      z-index: 2;
      pointer-events: none;
    }

    /* Large art-deco half circle behind logo */
    .deco-arc {
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      border: 1px solid rgba(201, 146, 42, 0.18);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 3;
      animation: arcSpin 40s linear infinite;
    }

    .deco-arc::before {
      content: '';
      position: absolute;
      inset: 12px;
      border-radius: 50%;
      border: 1px dashed rgba(201, 146, 42, 0.12);
    }

    .deco-arc::after {
      content: '';
      position: absolute;
      inset: 24px;
      border-radius: 50%;
      border: 1px solid rgba(201, 146, 42, 0.07);
    }

    @keyframes arcSpin {
      from {
        transform: translate(-50%, -50%) rotate(0deg);
      }

      to {
        transform: translate(-50%, -50%) rotate(360deg);
      }
    }

    .deco-arc-2 {
      position: absolute;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 1px solid rgba(201, 146, 42, 0.25);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 3;
      animation: arcSpin 28s linear infinite reverse;
      box-shadow: 0 0 40px rgba(201, 146, 42, 0.06) inset;
    }

    /* Corner crosshairs */
    .crosshair {
      position: absolute;
      z-index: 4;
      width: 20px;
      height: 20px;
    }

    .crosshair::before,
    .crosshair::after {
      content: '';
      position: absolute;
      background: rgba(201, 146, 42, 0.4);
    }

    .crosshair::before {
      width: 100%;
      height: 1px;
      top: 50%;
      left: 0;
      transform: translateY(-50%);
    }

    .crosshair::after {
      width: 1px;
      height: 100%;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
    }

    .ch-tl {
      top: 24px;
      left: 24px;
    }

    .ch-tr {
      top: 24px;
      right: 24px;
    }

    .ch-bl {
      bottom: 24px;
      left: 24px;
    }

    .ch-br {
      bottom: 24px;
      right: 24px;
    }

    /* LOGO */
    .logo-center {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      animation: logoReveal 1s 0.3s ease both;
    }

    @keyframes logoReveal {
      from {
        opacity: 0;
        transform: scale(0.85);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .logo-img {
      width: 110px;
      height: 110px;
      background-color: #fff;
      object-fit: cover;
      border-radius: 50%;
      filter: drop-shadow(0 8px 32px rgba(201, 146, 42, 0.35)) drop-shadow(0 2px 8px rgba(26, 31, 58, 0.15));
      animation: logoFloat 5s ease-in-out infinite;
    }

    @keyframes logoFloat {

      0%,
      100% {
        transform: translateY(0px);
        filter: drop-shadow(0 8px 32px rgba(201, 146, 42, 0.3)) drop-shadow(0 2px 8px rgba(26, 31, 58, 0.12));
      }

      50% {
        transform: translateY(-7px);
        filter: drop-shadow(0 16px 45px rgba(201, 146, 42, 0.5)) drop-shadow(0 4px 14px rgba(26, 31, 58, 0.18));
      }
    }

    /* Stars strip and unused wordmark removed for cleaner layout */

    /* ═══════════════════════════════════
   GLOBAL OVERLAYS
═══════════════════════════════════ */
    /* Outer gold border glow */
    .border-glow {
      position: absolute;
      inset: 0;
      border: 1px solid rgba(201, 146, 42, 0.3);
      pointer-events: none;
      z-index: 50;
    }

    /* Top shimmer bar */
    .top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent 0%, var(--gold) 20%, var(--gold-pale) 50%, var(--gold) 80%, transparent 100%);
      background-size: 200% 100%;
      animation: shimmer 3s linear infinite;
      z-index: 60;
    }

    @keyframes shimmer {
      0% {
        background-position: -200% center;
      }

      100% {
        background-position: 200% center;
      }
    }

    .bottom-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--gold) 30%, var(--gold-lt) 50%, var(--gold) 70%, transparent);
      z-index: 60;
    }

    /* =======================================
     RESPONSIVE - MOBILE ADAPTATIONS
  ======================================= */
    @media (max-width: 768px) {
      .left {
        width: 55% !important;
        padding: 5px 15px 5px 20px !important;
      }

      .t-line2,
      .t-line3 {
        font-size: 20px !important;
      }

      .desc {
        display: none !important;
      }

      .eyebrow {
        margin-bottom: 5px !important;
      }

      .feats {
        margin-bottom: 5px !important;
        gap: 10px !important;
      }

      .logo-img {
        width: 80px !important;
        height: 80px !important;
      }

      .deco-arc {
        width: 140px !important;
        height: 140px !important;
      }

      .deco-arc-2 {
        width: 110px !important;
        height: 110px !important;
      }
    }

    @media (max-width: 500px) {
      .left {
        width: 60% !important;
        padding: 5px 10px 5px 15px !important;
      }

      .t-line1 {
        font-size: 10px !important;
        letter-spacing: 4px !important;
      }

      .t-line2,
      .t-line3 {
        font-size: 16px !important;
      }

      .feats {
        display: none !important;
      }

      .logo-img {
        width: 60px !important;
        height: 60px !important;
      }

      .btn-inner {
        padding: 4px 12px !important;
        font-size: 8px !important;
      }

      .eyebrow {
        font-size: 7px !important;
        letter-spacing: 3px !important;
      }
    }
  </style>
</head>
